name: Adicionar favicon logo CUCA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  favicon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Injetar favicon e commitar
        env:
          SVG_CONTENT: >-
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <text x="5" y="78" font-family="Arial Black,sans-serif"
            font-size="76" font-weight="900" fill="#E8471A">c</text>
            <rect x="60" y="65" width="16" height="16" fill="#E8471A"/></svg>
        run: |
          git config user.name github-actions-bot
          git config user.email github-actions-bot@users.noreply.github.com
          B64=$(echo -n "$SVG_CONTENT" | base64 -w 0)
          TAG='<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,'$B64'">'
          perl -i -0pe 's|<link[^>]+rel=.icon.[^>]*/>||gi' index.html
          perl -i -0pe 's|<link[^>]+rel=.icon.[^>]*>||gi' index.html
          perl -i -pe "s|</head>|$TAG\n</head>|" index.html
          git add index.html
          git commit -m 'Adiciona favicon logo C. CUCA'
          git push
