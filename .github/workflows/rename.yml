name: Adicionar favicon logo CUCA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  favicon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Injetar favicon e commitar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          python3 -c "
import base64, re
svg = '<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><text x=\"5\" y=\"78\" font-family=\"Arial Black,sans-serif\" font-size=\"76\" font-weight=\"900\" fill=\"#E8471A\">c</text><rect x=\"60\" y=\"65\" width=\"16\" height=\"16\" fill=\"#E8471A\"/></svg>'
b64 = base64.b64encode(svg.encode()).decode()
tag = '<link rel=\"icon\" type=\"image/svg+xml\" href=\"data:image/svg+xml;base64,' + b64 + '\">'
with open('index.html','r',encoding='utf-8') as f: c = f.read()
c = re.sub(r'<link[^>]+rel=[^>]*icon[^>]*/?>','',c,flags=re.IGNORECASE)
c = c.replace('</head>', tag + chr(10) + '</head>', 1) if '</head>' in c else c.replace('<head>', '<head>' + chr(10) + tag, 1)
with open('index.html','w',encoding='utf-8') as f: f.write(c)
print('OK')
"

          git add index.html
          git commit -m "Adiciona favicon logo C. da CUCA"
          git push
