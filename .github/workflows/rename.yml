name: Adicionar favicon logo CUCA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  favicon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Injetar favicon no index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          python3 - <<'EOF'
import base64, re

svg = '''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <text x="5" y="78" font-family="Arial Black,Helvetica,sans-serif" font-size="76" font-weight="900" fill="#E8471A">c</text>
  <rect x="60" y="65" width="16" height="16" fill="#E8471A"/>
</svg>'''

b64 = base64.b64encode(svg.encode()).decode()
favicon_tag = f'<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,{b64}">'

with open('index.html', 'r', encoding='utf-8') as f:
    content = f.read()

# Remove favicon existente se houver
content = re.sub(r'<link[^>]+rel=["'](?:shortcut )?icon["'][^>]*>', '', content, flags=re.IGNORECASE)
content = re.sub(r'<link[^>]+type=["']image/[^"']+["'][^>]*rel=["'](?:shortcut )?icon["'][^>]*>', '', content, flags=re.IGNORECASE)

# Injeta o novo favicon logo antes de </head>
content = content.replace('</head>', favicon_tag + '\n</head>', 1)

with open('index.html', 'w', encoding='utf-8') as f:
    f.write(content)

print("Favicon injetado com sucesso!")
EOF

          git add index.html
          git commit -m "Adiciona favicon logo C. da CUCA"
          git push
